<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>SGI · El Cóndor</title>
  <meta name="description" content="Sistema de Gestión Inmobiliaria El Cóndor" />
  <meta name="theme-color" content="#ff6a00" />

  <link rel="icon" href="/src/img/favicon_white.svg" type="image/svg+xml" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,500;1,9..40,300&display=swap"
    rel="stylesheet"
  />
  <link rel="stylesheet" href="/css/style.css" />
</head>
<body>
  <aside class="sidebar" id="sidebar" aria-label="Navegación principal">
    <div class="sidebar-brand">
      <span class="brand-icon">
        <img src="/src/img/favicon_white.svg" alt="Logo El Cóndor" class="brand-logo" />
      </span>
      <span class="brand-name">El Cóndor</span>
    </div>
<nav class="sidebar-nav">
  <div class="nav-group">
    <span class="nav-group-title">General</span>

    <button type="button" class="nav-item active" data-view="dashboard">
      <span class="nav-icon"><i data-lucide="layout-dashboard"></i></span>
      <span>Dashboard</span>
    </button>
  </div>

  <div class="nav-group">
    <span class="nav-group-title">Operación</span>

    <button type="button" class="nav-item" data-view="proyectos">
      <span class="nav-icon"><i data-lucide="building-2"></i></span>
      <span>Proyectos</span>
    </button>

    <button type="button" class="nav-item" data-view="lotes">
      <span class="nav-icon"><i data-lucide="map"></i></span>
      <span>Lotes</span>
    </button>

    <button type="button" class="nav-item" data-view="compradores">
      <span class="nav-icon"><i data-lucide="users"></i></span>
      <span>Compradores</span>
    </button>

    <button type="button" class="nav-item" data-view="ventas">
      <span class="nav-icon"><i data-lucide="briefcase"></i></span>
      <span>Ventas</span>
    </button>
  </div>

  <div class="nav-group">
    <span class="nav-group-title">Finanzas</span>

    <button type="button" class="nav-item" data-view="cuotas">
      <span class="nav-icon"><i data-lucide="calendar"></i></span>
      <span>Cuotas</span>
    </button>

    <button type="button" class="nav-item" data-view="pagos">
      <span class="nav-icon"><i data-lucide="wallet"></i></span>
      <span>Pagos</span>
    </button>

    <button type="button" class="nav-item" data-view="comisionistas">
      <span class="nav-icon"><i data-lucide="percent"></i></span>
      <span>Comisionistas</span>
    </button>

    <button type="button" class="nav-item" data-view="facturas">
      <span class="nav-icon"><i data-lucide="receipt"></i></span>
      <span>Facturas</span>
    </button>

    <button type="button" class="nav-item" data-view="recibos">
      <span class="nav-icon"><i data-lucide="file-text"></i></span>
      <span>Recibos</span>
    </button>
  </div>

  <div class="nav-divider"></div>

  <div class="nav-group">
    <span class="nav-group-title">Control</span>

    <button type="button" class="nav-item" data-view="reportes">
      <span class="nav-icon"><i data-lucide="bar-chart-3"></i></span>
      <span>Reportes</span>
    </button>

    <button type="button" class="nav-item" data-view="alertas">
      <span class="nav-icon"><i data-lucide="triangle-alert"></i></span>
      <span>Alertas</span>
    </button>

    <button type="button" class="nav-item" data-view="auditoria">
      <span class="nav-icon"><i data-lucide="shield-check"></i></span>
      <span>Auditoría</span>
    </button>

    <button type="button" class="nav-item" data-view="usuarios">
      <span class="nav-icon"><i data-lucide="settings"></i></span>
      <span>Usuarios</span>
    </button>
  </div>
</nav>

    <div class="sidebar-footer">SGI v1.0</div>
  </aside>

  <main class="main-content">
    <header class="topbar">
      <div class="topbar-left">
        <button
          type="button"
          class="sidebar-toggle"
          id="sidebarToggle"
          aria-label="Colapsar barra lateral"
          aria-pressed="false"
          title="Colapsar barra lateral"
        >
          <i data-lucide="panel-left-close"></i>
        </button>

        <div class="topbar-heading">
          <h1 class="view-title" id="viewTitle">Dashboard</h1>
          <span class="topbar-subtitle" id="topbarSubtitle">
            Centro de operación inmobiliaria
          </span>
        </div>
      </div>

      <div class="topbar-actions">
        <div id="usuarioInfo" class="usuario-info" aria-live="polite"></div>
        <span class="today-date" id="todayDate"></span>
      </div>
    </header>

    <section class="view-container" id="viewContainer" aria-live="polite">
      <!-- Las vistas se renderizan aquí -->
    </section>
  </main>

  <div class="modal-overlay" id="modalOverlay" aria-hidden="true">
    <div class="modal" id="modal" role="dialog" aria-modal="true" aria-labelledby="modalTitle">
      <div class="modal-header">
        <h2 class="modal-title" id="modalTitle"></h2>
        <button type="button" class="modal-close" id="modalClose" aria-label="Cerrar modal">
          ✕
        </button>
      </div>
      <div class="modal-body" id="modalBody"></div>
    </div>
  </div>

  <!--
    ORDEN DE CARGA — IMPORTANTE:
    1. auth.js (módulo) -> inicializa Firebase y expone window._authReady / window._firebaseAuth
    2. api.js           -> usa window._firebaseAuth para refrescar tokens
    3. vistas y app.js  -> usan API y window._authReady
  -->

  <script type="module" src="/js/auth.js"></script>

  <script>
    window.onerror = (msg, src, line) => {
      console.error(`[ERROR] ${msg} | ${src} | línea ${line}`);
    };
  </script>

  <script src="/js/api.js"></script>
  <script src="/js/ui.js"></script>

  <script src="/js/views/dashboard.js"></script>
  <script src="/js/views/proyectos.js"></script>
  <script src="/js/views/lotes.js"></script>
  <script src="/js/views/compradores.js"></script>
  <script src="/js/views/ventas.js"></script>
  <script src="/js/views/cuotas.js"></script>
  <script src="/js/views/pagos.js"></script>
  <script src="/js/views/comisionistas.js"></script>
  <script src="/js/views/facturas.js"></script>
  <script src="/js/views/recibos.js"></script>
  <script src="/js/views/reportes.js"></script>
  <script src="/js/views/alertas.js"></script>
  <script src="/js/views/auditoria.js"></script>
  <script src="/js/views/usuarios.js"></script>
  <script src="/js/views/reportes.js"></script>


  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
  <script type="module" src="/js/app.js"></script>
</body>
</html>
