<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>SGI · El Cóndor</title>
  <link rel="icon" href="/src/img/favicon_white.svg">    
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,500;1,9..40,300&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="/css/style.css"/>
</head>
<body>
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-brand"> 
      <span class="brand-icon"><img style="width: 2rem;" src="/src/img/favicon_white.svg"/></span>    
      <span class="brand-name">El Cóndor</span>
    </div> 
    <nav class="sidebar-nav">
      <button class="nav-item active" data-view="dashboard">
        <span class="nav-icon">▦</span><span>Dashboard</span>
      </button>
      <button class="nav-item" data-view="proyectos">
        <span class="nav-icon">◉</span><span>Proyectos</span>
      </button>
      <button class="nav-item" data-view="lotes">
        <span class="nav-icon">◫</span><span>Lotes</span>
      </button>
      <button class="nav-item" data-view="compradores">
        <span class="nav-icon">◎</span><span>Compradores</span>
      </button>
      <button class="nav-item" data-view="ventas">
        <span class="nav-icon">◈</span><span>Ventas</span>
      </button>
      <button class="nav-item" data-view="cuotas">
        <span class="nav-icon">◷</span><span>Cuotas</span>
      </button>
      <button class="nav-item" data-view="pagos">
        <span class="nav-icon">◐</span><span>Pagos</span>
      </button>
      <button class="nav-item" data-view="comisionistas">
        <span class="nav-icon">◑</span><span>Comisionistas</span>
      </button>
      <button class="nav-item" data-view="facturas">
        <span class="nav-icon">◧</span><span>Facturas</span>
      </button>
      <button class="nav-item" data-view="recibos">
        <span class="nav-icon">◨</span><span>Recibos</span>
      </button>
      <div class="nav-divider"></div>
      <button class="nav-item" data-view="reportes">
        <span class="nav-icon">◈</span><span>Reportes</span>
      </button>
      <button class="nav-item" data-view="alertas">
        <span class="nav-icon">⚠</span><span>Alertas</span>
      </button>
      <button class="nav-item" data-view="auditoria">
        <span class="nav-icon">◉</span><span>Auditoría</span>
      </button>
      <button class="nav-item" data-view="usuarios" style="display:none;">
        <span class="nav-icon">⚙</span><span>Usuarios</span>
      </button>
    </nav>
    <div class="sidebar-footer">SGI v1.0</div>
  </aside>

  <main class="main-content">  
    <div id="usuarioInfo" style="display:flex; align-items:center; gap:.75rem; padding: .5rem 1rem;"></div>
    <header class="topbar">
      <h1 class="view-title" id="viewTitle">Dashboard</h1>
      <div class="topbar-actions">
        <span class="today-date" id="todayDate"></span>
      </div>
    </header>
    <div class="view-container" id="viewContainer">
      <!-- Las vistas se inyectan aquí -->
    </div>
  </main>

  <!-- MODAL GLOBAL -->
  <div class="modal-overlay" id="modalOverlay">
    <div class="modal" id="modal">
      <div class="modal-header">
        <h2 class="modal-title" id="modalTitle"></h2>
        <button class="modal-close" id="modalClose">✕</button>
      </div>
      <div class="modal-body" id="modalBody"></div>
    </div>
  </div>

  <!--
    ORDEN DE CARGA — IMPORTANTE:
    1. auth.js (módulo) → inicializa Firebase y expone window._authReady / window._firebaseAuth
    2. api.js           → usa window._firebaseAuth para refrescar tokens
    3. vistas y app.js  → usan API y window._authReady
  -->

  <!-- 1. Firebase Auth (módulo ES) — debe ir PRIMERO -->
  <script type="module" src="/js/auth.js"></script>

  <!-- 2. Scripts regulares -->
   <script>    
    window.onerror = (msg, src, line) => {
      console.error(`[ERROR] ${msg} | ${src} | línea ${line}`);
    };
  </script>
  <script src="/js/api.js"></script>
  <script src="/js/ui.js"></script>
  <script src="/js/views/dashboard.js"></script>
  <script src="/js/views/proyectos.js"></script>
  <script src="/js/views/lotes.js"></script>
  <script src="/js/views/compradores.js"></script>
  <script src="/js/views/ventas.js"></script>
  <script src="/js/views/cuotas.js"></script>
  <script src="/js/views/pagos.js"></script>
  <script src="/js/views/comisionistas.js"></script>
  <script src="/js/views/facturas.js"></script>
  <script src="/js/views/recibos.js"></script>
  <script src="/js/views/reportes.js"></script>
  <script src="/js/views/usuarios.js"></script>
  <script type="module" src="/js/app.js"></script>
</body>
</html>
