<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Iniciar sesión — El Cóndor</title>

  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,500;1,9..40,300&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="/css/views/login.css" />
</head>
<body>

<div class="card">
  <div class="brand">
    <span class="brand-icon">
      <img src="/src/img/favicon_white.svg" alt="El Cóndor" />
    </span>
    <div>
      <div class="brand-name">El Cóndor</div>
      <div class="brand-sub">Sistema de Gestión Inmobiliaria</div>
    </div>
  </div>

  <div class="tabs" id="tabs-principales">
    <button class="tab-btn active" id="tab-login" onclick="mostrarPanel('login')">Ingresar</button>
    <button class="tab-btn" id="tab-registro" onclick="mostrarPanel('registro')">Crear cuenta</button>
  </div>

  <!-- PANEL LOGIN -->
  <div class="panel active" id="panel-login">
    <div class="field">
      <label for="l-email">Correo electrónico</label>
      <input type="email" id="l-email" placeholder="usuario@ejemplo.com" autocomplete="email" />
    </div>

    <div class="field">
      <label for="l-password">Contraseña</label>
      <input type="password" id="l-password" placeholder="••••••••" autocomplete="current-password" />
    </div>

    <div style="text-align:right; margin-top:-.2rem; margin-bottom:1rem;">
      <button class="link-btn" onclick="mostrarPanel('recuperar')">¿Olvidaste tu contraseña?</button>
    </div>

    <button class="btn btn-primary" id="btn-login">Ingresar</button>

    <div class="divider-text">o continúa con</div>

    <button class="btn btn-google" id="btn-google-login">
      <svg viewBox="0 0 48 48" xmlns="http://www.w3.org/2000/svg">
        <path fill="#EA4335" d="M24 9.5c3.14 0 5.95 1.08 8.17 2.84l6.08-6.08C34.49 3.1 29.5 1 24 1 14.82 1 7.07 6.48 3.64 14.18l7.08 5.5C12.4 13.67 17.74 9.5 24 9.5z"/>
        <path fill="#4285F4" d="M46.5 24.5c0-1.64-.15-3.22-.42-4.75H24v9h12.67c-.55 2.97-2.2 5.48-4.67 7.17l7.18 5.57C43.46 37.32 46.5 31.36 46.5 24.5z"/>
        <path fill="#FBBC05" d="M10.72 28.32A14.54 14.54 0 0 1 9.5 24c0-1.5.26-2.95.72-4.32l-7.08-5.5A23.93 23.93 0 0 0 .5 24c0 3.87.92 7.53 2.54 10.77l7.68-6.45z"/>
        <path fill="#34A853" d="M24 46.5c5.5 0 10.12-1.82 13.5-4.95l-7.18-5.57c-1.78 1.2-4.07 1.9-6.32 1.9-6.26 0-11.6-4.17-13.28-9.81l-7.68 6.45C7.07 41.52 14.82 46.5 24 46.5z"/>
      </svg>
      Continuar con Google
    </button>

    <div class="error-box" id="l-error"></div>
  </div>

  <!-- PANEL REGISTRO -->
  <div class="panel" id="panel-registro">
    <div class="field">
      <label for="r-email">Correo electrónico</label>
      <input type="email" id="r-email" placeholder="usuario@ejemplo.com" autocomplete="email" />
    </div>

    <div class="field">
      <label for="r-password">Contraseña</label>
      <input type="password" id="r-password" placeholder="Mínimo 8 caracteres"
             autocomplete="new-password" oninput="validarPassword(this.value)" />
      <div class="pwd-rules">
        <span class="pwd-rule" id="rule-len">Mínimo 8 caracteres</span>
        <span class="pwd-rule" id="rule-upper">Una letra mayúscula</span>
        <span class="pwd-rule" id="rule-num">Un número</span>
      </div>
    </div>

    <div class="field">
      <label for="r-confirm">Confirmar contraseña</label>
      <input type="password" id="r-confirm" placeholder="Repite la contraseña" autocomplete="new-password" />
    </div>

    <button class="btn btn-primary" id="btn-registro" style="margin-top:.25rem;">Crear cuenta</button>

    <div class="divider-text">o continúa con</div>

    <button class="btn btn-google" id="btn-google-registro">
      <svg viewBox="0 0 48 48" xmlns="http://www.w3.org/2000/svg">
        <path fill="#EA4335" d="M24 9.5c3.14 0 5.95 1.08 8.17 2.84l6.08-6.08C34.49 3.1 29.5 1 24 1 14.82 1 7.07 6.48 3.64 14.18l7.08 5.5C12.4 13.67 17.74 9.5 24 9.5z"/>
        <path fill="#4285F4" d="M46.5 24.5c0-1.64-.15-3.22-.42-4.75H24v9h12.67c-.55 2.97-2.2 5.48-4.67 7.17l7.18 5.57C43.46 37.32 46.5 31.36 46.5 24.5z"/>
        <path fill="#FBBC05" d="M10.72 28.32A14.54 14.54 0 0 1 9.5 24c0-1.5.26-2.95.72-4.32l-7.08-5.5A23.93 23.93 0 0 0 .5 24c0 3.87.92 7.53 2.54 10.77l7.68-6.45z"/>
        <path fill="#34A853" d="M24 46.5c5.5 0 10.12-1.82 13.5-4.95l-7.18-5.57c-1.78 1.2-4.07 1.9-6.32 1.9-6.26 0-11.6-4.17-13.28-9.81l-7.68 6.45C7.07 41.52 14.82 46.5 24 46.5z"/>
      </svg>
      Continuar con Google
    </button>

    <div class="error-box" id="r-error"></div>
    <div class="success-box" id="r-success"></div>
  </div>

  <!-- PANEL RECUPERAR -->
  <div class="panel" id="panel-recuperar">
    <div style="margin-bottom:1.25rem;">
      <p style="font-size:.92rem; color:var(--text-muted); line-height:1.6;">
        Ingresa tu correo y te enviaremos un enlace para restablecer tu contraseña.
      </p>
    </div>

    <div class="field">
      <label for="rec-email">Correo electrónico</label>
      <input type="email" id="rec-email" placeholder="usuario@ejemplo.com" autocomplete="email" />
    </div>

    <button class="btn btn-primary" id="btn-recuperar">Enviar enlace</button>

    <div style="text-align:center; margin-top:.95rem;">
      <button class="link-btn" onclick="mostrarPanel('login')">&larr; Volver al inicio de sesión</button>
    </div>

    <div class="error-box" id="rec-error"></div>
    <div class="success-box" id="rec-success"></div>
  </div>

  <div class="card-footer">SGI v1.0 · El Cóndor</div>
</div>

<script type="module">
  import {
    loginEmail, loginGoogle,
    esperarAuthListo,
    registerEmail,
    resetPassword
  } from '/js/auth.js';

  esperarAuthListo().then(user => {
    if (user) window.location.href = '/index.html';
  });

  const ERROR_MSG = {
    'auth/invalid-email':           'El correo no tiene un formato válido.',
    'auth/user-not-found':          'No existe una cuenta con ese correo.',
    'auth/wrong-password':          'Contraseña incorrecta.',
    'auth/invalid-credential':      'Correo o contraseña incorrectos.',
    'auth/too-many-requests':       'Demasiados intentos. Intenta más tarde.',
    'auth/user-disabled':           'Esta cuenta fue deshabilitada.',
    'auth/email-already-in-use':    'Ya existe una cuenta con ese correo.',
    'auth/weak-password':           'La contraseña es demasiado débil.',
    'auth/popup-closed-by-user':    null,
    'auth/cancelled-popup-request': null,
    'auth/popup-blocked':           'El navegador bloqueó la ventana. Permite popups para este sitio.',
    'auth/network-request-failed':  'Sin conexión. Verifica tu red.',
  };

  function mensajeError(err) {
    return ERROR_MSG[err.code] ?? ('Error: ' + err.message);
  }

  function showError(id, err) {
    if (err.code in ERROR_MSG && ERROR_MSG[err.code] === null) return;
    const el = document.getElementById(id);
    el.textContent = mensajeError(err);
    el.style.display = 'block';
  }

  function showSuccess(id, msg) {
    const el = document.getElementById(id);
    el.textContent = msg;
    el.style.display = 'block';
  }

  function hideMessages(...ids) {
    ids.forEach(id => {
      const el = document.getElementById(id);
      if (el) el.style.display = 'none';
    });
  }

  function setLoading(btn, loading, esGoogle) {
    btn.disabled = loading;
    if (loading) {
      btn.dataset.original = btn.innerHTML;
      const cls = esGoogle ? 'spinner spinner-dark' : 'spinner';
      btn.innerHTML = '<span class="' + cls + '"></span> Cargando...';
    } else {
      btn.innerHTML = btn.dataset.original || btn.innerHTML;
    }
  }

  window.mostrarPanel = function(panel) {
    document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
    document.getElementById('panel-' + panel).classList.add('active');

    const tabs = document.getElementById('tabs-principales');
    if (panel === 'recuperar') {
      tabs.style.display = 'none';
    } else {
      tabs.style.display = 'flex';
      document.getElementById('tab-login').classList.toggle('active', panel === 'login');
      document.getElementById('tab-registro').classList.toggle('active', panel === 'registro');
    }
  };

  window.validarPassword = function(val) {
    document.getElementById('rule-len').classList.toggle('ok', val.length >= 8);
    document.getElementById('rule-upper').classList.toggle('ok', /[A-Z]/.test(val));
    document.getElementById('rule-num').classList.toggle('ok', /[0-9]/.test(val));
  };

  document.getElementById('btn-login').addEventListener('click', async () => {
    hideMessages('l-error');
    const email = document.getElementById('l-email').value.trim();
    const pwd = document.getElementById('l-password').value;

    if (!email || !pwd) {
      const el = document.getElementById('l-error');
      el.textContent = 'Completa todos los campos.';
      el.style.display = 'block';
      return;
    }

    const btn = document.getElementById('btn-login');
    setLoading(btn, true);

    try {
      await loginEmail(email, pwd);
      window.location.href = '/index.html';
    } catch (err) {
      showError('l-error', err);
    } finally {
      setLoading(btn, false);
    }
  });

  document.getElementById('l-password').addEventListener('keydown', e => {
    if (e.key === 'Enter') document.getElementById('btn-login').click();
  });

  document.getElementById('btn-google-login').addEventListener('click', async () => {
    hideMessages('l-error');
    const btn = document.getElementById('btn-google-login');
    setLoading(btn, true, true);

    try {
      await loginGoogle();
      window.location.href = '/index.html';
    } catch (err) {
      showError('l-error', err);
    } finally {
      setLoading(btn, false, true);
    }
  });

  document.getElementById('btn-registro').addEventListener('click', async () => {
    hideMessages('r-error', 'r-success');
    const email = document.getElementById('r-email').value.trim();
    const pwd = document.getElementById('r-password').value;
    const confirm = document.getElementById('r-confirm').value;

    if (!email || !pwd || !confirm) {
      const el = document.getElementById('r-error');
      el.textContent = 'Completa todos los campos.';
      el.style.display = 'block';
      return;
    }

    if (pwd.length < 8 || !/[A-Z]/.test(pwd) || !/[0-9]/.test(pwd)) {
      const el = document.getElementById('r-error');
      el.textContent = 'La contraseña no cumple los requisitos.';
      el.style.display = 'block';
      return;
    }

    if (pwd !== confirm) {
      const el = document.getElementById('r-error');
      el.textContent = 'Las contraseñas no coinciden.';
      el.style.display = 'block';
      return;
    }

    const btn = document.getElementById('btn-registro');
    setLoading(btn, true);

    try {
      await registerEmail(email, pwd);
      window.location.href = '/index.html';
    } catch (err) {
      showError('r-error', err);
    } finally {
      setLoading(btn, false);
    }
  });

  document.getElementById('btn-google-registro').addEventListener('click', async () => {
    hideMessages('r-error', 'r-success');
    const btn = document.getElementById('btn-google-registro');
    setLoading(btn, true, true);

    try {
      await loginGoogle();
      window.location.href = '/index.html';
    } catch (err) {
      showError('r-error', err);
    } finally {
      setLoading(btn, false, true);
    }
  });

  document.getElementById('btn-recuperar').addEventListener('click', async () => {
    hideMessages('rec-error', 'rec-success');
    const email = document.getElementById('rec-email').value.trim();

    if (!email) {
      const el = document.getElementById('rec-error');
      el.textContent = 'Ingresa tu correo electrónico.';
      el.style.display = 'block';
      return;
    }

    const btn = document.getElementById('btn-recuperar');
    setLoading(btn, true);

    try {
      await resetPassword(email);
      showSuccess('rec-success', 'Enlace enviado. Revisa tu bandeja de entrada y la carpeta de spam.');
      document.getElementById('rec-email').value = '';
    } catch (err) {
      showError('rec-error', err);
    } finally {
      setLoading(btn, false);
    }
  });

  document.getElementById('rec-email').addEventListener('keydown', e => {
    if (e.key === 'Enter') document.getElementById('btn-recuperar').click();
  });
</script>

</body>
</html>
